name: Collect note.com Stats

on:
  schedule:
    - cron: '0 15 * * *'  # 00:00 JST (UTC+9)
  workflow_dispatch:       # 手動実行も可能

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect stats
        env:
          NOTE_COOKIE_HEADER: ${{ secrets.NOTE_COOKIE_HEADER }}
        run: python scripts/collect_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/all_stats.json
          git diff --staged --quiet || git commit -m "chore: stats $(date -u +%Y-%m-%d)"
          git push
